# Fly.io config for the Roonscep game server.
# Deploy from the repo root: `fly launch` (first time) or `fly deploy`.
# Set the DB with: `fly secrets set DATABASE_URL=postgres://...` (Neon/Supabase).
#
# The auto-stop/min_machines_running=0 combo is the whole point: the machine
# stops when the last player leaves and cold-boots on the next connection, so
# it costs ~nothing when nobody is online. The world resetting on boot is fine
# by design — only per-player saves persist (in Postgres).

app = "roonscep"          # rename to your Fly app name on first launch
primary_region = "sea"    # pick the region nearest your players

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 2567
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
